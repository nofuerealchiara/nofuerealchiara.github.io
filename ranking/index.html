<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Your no fue real Track Ranking</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script><style>body{font-family:"Times New Roman",Times,serif;background-color:#f2f2f2;color:#333;display:flex;flex-direction:column;align-items:center;margin:0;padding:15px;box-sizing:border-box;}#welcome-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000;}.popup-content{background:white;padding:25px;border-radius:12px;text-align:center;max-width:280px;font-family:sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.3);}.popup-content p{line-height:1.5;margin:0;}.popup-content button{margin-top:18px;background:#000;color:white;border:none;padding:10px 25px;border-radius:20px;cursor:pointer;font-weight:bold;}#capture-area{display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;}h1{font-size:1.8rem;text-align:center;margin-bottom:18px;margin-top:10px;line-height:1.1;}h1 i{font-style:italic;font-weight:normal;}.table-wrapper{width:100%;border:1px solid #000;background-color:#fff;margin-bottom:15px;}.header{display:grid;grid-template-columns:45px 1fr;background-color:#333;color:#fff;font-weight:bold;font-size:1rem;}.header div{padding:10px 2px;text-align:center;}.header div:first-child{border-right:1px solid #555;}.sortable-item{display:grid;grid-template-columns:45px 1fr;border-top:1px solid #000;background:#fff;touch-action:none;}.num{padding:9px 0;text-align:center;border-right:1px solid #000;font-size:1.05rem;display:flex;align-items:center;justify-content:center;}.name{padding:9px 10px;text-align:center;font-size:1.05rem;display:flex;align-items:center;justify-content:center;}.reset-btn{background:#fff;border:1px solid #999;border-radius:4px;padding:8px 20px;font-family:sans-serif;font-size:0.9rem;cursor:pointer;margin-bottom:20px;}.streaming-links{display:flex;gap:25px;margin-top:5px;padding-bottom:10px;}.streaming-links a{color:#555;text-decoration:none;font-size:1.4rem;transition:color 0.2s;}.streaming-links a:hover{color:#000;}.fa-spotify:hover{color:#1DB954;}.fa-apple:hover{color:#FC3C44;}.fa-youtube:hover{color:#FF0000;}.sortable-ghost{opacity:0.2;background:#f9f9f9;}</style></head><body><div id="welcome-popup"><div class="popup-content"><p><strong>Chiara Oliver</strong><br>Desplaza las canciones para crear tu ranking personal.</p><button onclick="closePopup()">Empezar</button></div></div><div id="capture-area"><h1>Your <i>no fue real</i> Track Ranking:</h1><div class="table-wrapper"><div class="header"><div>#</div><div>Track Name</div></div><div id="rank-list"></div></div><button class="reset-btn" onclick="location.reload()">Restart</button><div class="streaming-links"><a href="https://open.spotify.com/intl-es/album/1FwjLwFWI7cQsG9zk91pXx" target="_blank" title="Spotify"><i class="fab fa-spotify"></i></a><a href="https://music.apple.com/album/1894076993" target="_blank" title="Apple Music"><i class="fab fa-apple"></i></a><a href="https://www.youtube.com/playlist?list=PLLd88ls_r-L9U0gl0Xq_wXxm2Uy_A4lRr" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a></div></div><script> const tracks = [ "es mejor así", "2+2=5", "no fue real", "margaritas", "lo siento x ser yo", "parte de mí", "puzzle", "si te tuviera aquí", "una más", "me & my girls", "me puse a escribir (intro)", "un minuto +", "calle luna" ]; const list = document.getElementById('rank-list'); function closePopup() { document.getElementById('welcome-popup').style.display = 'none'; } tracks.forEach((track, index) => { const row = document.createElement('div'); row.className = 'sortable-item'; row.innerHTML = `<div class="num">${index + 1}</div><div class="name">${track}</div>`; list.appendChild(row); }); new Sortable(list, { animation: 150, ghostClass: 'sortable-ghost', onEnd: function() { const nums = document.querySelectorAll('.num'); nums.forEach((n, i) => n.innerText = i + 1); } }); </script></body></html>
